<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>玄機易卜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Ma+Shan+Zheng&display=swap');

:root {
  --paper:  #f2e8cc;
  --aged:   #e4d5aa;
  --brush:  #1e150a;
  --vermil: #b03020;
  --gold:   #8a6e2a;
  --gold-l: #b99040;
  --fade:   #7a6a48;
  --faint:  #ccc0a0;
  --red-dim:#8a2818;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  background: var(--paper);
  color: var(--brush);
  font-family: 'Noto Serif TC', serif;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 31px,
    rgba(30,21,10,0.055) 31px, rgba(30,21,10,0.055) 32px
  );
}

.wrap {
  position:relative; z-index:1;
  max-width:520px;
  margin:0 auto;
  padding:48px 28px 80px;
}

/* Header */
.site-header { text-align:center; margin-bottom:48px; animation:fadeIn 1s ease both; }
.seal {
  font-family:'Ma Shan Zheng', cursive;
  font-size:56px; color:var(--vermil); line-height:1; margin-bottom:8px;
  text-shadow:2px 2px 0 rgba(176,48,32,0.15);
}
.site-title { font-size:13px; letter-spacing:8px; color:var(--fade); margin-bottom:4px; }
.site-sub   { font-size:11px; letter-spacing:3px; color:var(--faint); }

/* Mode toggle */
.mode-toggle {
  display:flex; align-items:center; justify-content:center;
  gap:0; margin:20px auto 0; width:fit-content;
  border:1px solid var(--faint); border-radius:2px; overflow:hidden;
}
.mode-btn {
  padding:8px 18px; font-family:'Noto Serif TC',serif;
  font-size:11px; letter-spacing:2px; color:var(--fade);
  background:transparent; border:none; cursor:pointer;
  transition:all 0.25s; white-space:nowrap;
}
.mode-btn.active {
  background:var(--vermil); color:#fff;
}
.mode-sep { width:1px; background:var(--faint); align-self:stretch; }

/* Refined mode textarea */
.refined-input {
  width:100%; background:transparent;
  border:none; border-bottom:1px solid var(--faint);
  color:var(--brush); font-family:'Noto Serif TC',serif; font-size:14px;
  padding:10px 2px; outline:none; resize:none; height:96px;
  transition:border-color 0.3s; line-height:1.9;
}
.refined-input:focus { border-bottom-color:var(--gold); }

/* Steps */
.steps {
  display:flex; align-items:center; justify-content:center;
  gap:0; margin-bottom:40px; animation:fadeIn 1.2s ease both;
}
.step-node {
  width:30px; height:30px; border:1px solid var(--faint); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; color:var(--faint); transition:all 0.4s; position:relative;
}
.step-node.active { border-color:var(--vermil); color:var(--vermil); box-shadow:0 0 0 3px rgba(176,48,32,0.1); }
.step-node.done   { background:var(--vermil); border-color:var(--vermil); color:#fff; }
.step-line { width:40px; height:1px; background:var(--faint); transition:background 0.4s; }
.step-line.done { background:var(--vermil); }
.step-lbl {
  position:absolute; top:36px; left:50%; transform:translateX(-50%);
  font-size:9px; letter-spacing:1px; color:var(--fade); white-space:nowrap;
}

/* Panel */
.panel { display:none; animation:slideUp 0.5s ease both; }
.panel.active { display:block; }

/* Daoist bubble */
.daoist-box { display:flex; gap:14px; align-items:flex-start; margin-bottom:28px; }
.daoist-ava {
  flex-shrink:0; width:44px; height:44px;
  border:1px solid var(--vermil); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; color:var(--vermil); background:var(--aged);
  font-family:'Ma Shan Zheng',cursive; letter-spacing:0;
}
.daoist-bubble {
  flex:1; background:var(--aged); border:1px solid var(--faint);
  border-radius:0 6px 6px 6px; padding:14px 16px; position:relative;
}
.daoist-bubble::before {
  content:''; position:absolute; left:-7px; top:14px;
  border:4px solid transparent; border-right-color:var(--faint);
}
.daoist-bubble::after {
  content:''; position:absolute; left:-5px; top:15px;
  border:3px solid transparent; border-right-color:var(--aged);
}
.speech { font-size:14px; line-height:1.9; color:var(--brush); }
.speech-em { color:var(--vermil); font-weight:600; }

/* Section label */
.sect-lbl {
  font-size:10px; letter-spacing:4px; color:var(--gold);
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.sect-lbl::after { content:''; flex:1; height:1px; background:var(--faint); }

/* Field */
.field { margin-bottom:22px; }
.field label { display:block; font-size:11px; letter-spacing:2px; color:var(--fade); margin-bottom:8px; }
input[type=text], textarea {
  width:100%; background:transparent;
  border:none; border-bottom:1px solid var(--faint);
  color:var(--brush); font-family:'Noto Serif TC',serif; font-size:15px;
  padding:8px 2px; outline:none; transition:border-color 0.3s;
}
input[type=text]:focus, textarea:focus { border-bottom-color:var(--gold); }
textarea { resize:none; height:72px; }

/* Option grid */
.opt-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
.opt-btn {
  background:transparent; border:1px solid var(--faint); border-radius:2px;
  padding:12px 8px; font-family:'Noto Serif TC',serif; font-size:13px;
  color:var(--brush); cursor:pointer; text-align:center; transition:all 0.25s; line-height:1.5;
}
.opt-btn:hover { border-color:var(--gold); background:rgba(138,110,42,0.06); }
.opt-btn.sel   { border-color:var(--vermil); background:rgba(176,48,32,0.07); color:var(--vermil); }

/* Domain grid */
.domain-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
.dom-btn {
  background:transparent; border:1px solid var(--faint); border-radius:2px;
  padding:14px 4px; font-family:'Noto Serif TC',serif; font-size:12px;
  color:var(--brush); cursor:pointer; text-align:center; transition:all 0.25s; line-height:1.7;
}
.dom-btn:hover { border-color:var(--gold); background:rgba(138,110,42,0.05); }
.dom-btn.sel   { border-color:var(--vermil); background:rgba(176,48,32,0.07); color:var(--vermil); font-weight:600; }
.dom-icon { font-size:18px; display:block; margin-bottom:2px; }

.other-wrap { display:none; margin-top:4px; }
.other-wrap.show { display:block; }

/* Buttons */
.cast-btn {
  width:100%; background:var(--vermil); border:none; border-radius:2px;
  padding:18px; font-family:'Ma Shan Zheng',cursive; font-size:24px;
  letter-spacing:8px; color:#fff; cursor:pointer; margin-top:8px;
  transition:all 0.3s; text-shadow:1px 1px 0 rgba(0,0,0,0.2);
  box-shadow:0 3px 14px rgba(176,48,32,0.28);
}
.cast-btn:hover { background:var(--red-dim); transform:translateY(-2px); box-shadow:0 6px 20px rgba(176,48,32,0.38); }
.cast-btn:active { transform:translateY(0); }

.next-btn {
  width:100%; background:transparent; border:1px solid var(--gold); border-radius:2px;
  padding:13px; font-family:'Noto Serif TC',serif; font-size:13px;
  letter-spacing:4px; color:var(--gold); cursor:pointer; margin-top:8px; transition:all 0.25s;
}
.next-btn:hover { background:rgba(138,110,42,0.07); }

/* Casting */
#castScreen { display:none; text-align:center; padding:64px 0; }
#castScreen.active { display:block; animation:fadeIn 0.4s ease both; }
.cast-ring {
  width:88px; height:88px; border:1px solid var(--faint);
  border-top-color:var(--vermil); border-radius:50%;
  margin:0 auto 28px; animation:spin 1.2s linear infinite;
}
.cast-glyph { font-family:'Ma Shan Zheng',cursive; font-size:36px; color:var(--vermil); margin-bottom:16px; animation:pulse 1.5s ease infinite; }
.cast-words { font-size:12px; letter-spacing:3px; color:var(--fade); }

/* Result */
#resultScreen { display:none; }
#resultScreen.active { display:block; animation:slideUp 0.7s ease both; }

.r-hex { text-align:center; padding:32px 0 24px; border-bottom:1px solid var(--faint); margin-bottom:28px; }
.r-glyph {
  font-size:92px; line-height:1; color:var(--brush); margin-bottom:10px;
  filter:drop-shadow(2px 3px 0 rgba(30,21,10,0.12));
}
.r-name   { font-family:'Ma Shan Zheng',cursive; font-size:28px; color:var(--vermil); letter-spacing:4px; margin-bottom:4px; }
.r-pinyin { font-size:11px; letter-spacing:3px; color:var(--fade); }

.r-sec { margin-bottom:24px; }
.r-lbl { font-size:10px; letter-spacing:4px; color:var(--gold); margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid var(--faint); }
.r-body { font-size:14px; line-height:2; color:var(--brush); }
.r-sub  { font-size:13px; line-height:1.9; color:var(--fade); margin-top:6px; padding-left:12px; border-left:2px solid var(--faint); }

/* Yao stack */
.yao-stack { display:flex; flex-direction:column-reverse; gap:8px; margin:16px 0; }
.yao-row   { display:flex; align-items:center; gap:10px; height:10px; }
.yao-seg   { height:6px; border-radius:1px; background:var(--brush); }
.yao-seg.yang { width:64px; }
.yao-seg.yin  { width:28px; }
.yao-gap      { width:8px; }
.yao-row.moving .yao-seg { background:var(--vermil); box-shadow:0 0 5px rgba(176,48,32,0.4); }
.yao-lbl  { font-size:10px; color:var(--fade); letter-spacing:1px; }
.yao-row.moving .yao-lbl { color:var(--vermil); }

/* Changed hex */
.ch-box { display:flex; gap:16px; align-items:center; background:var(--aged); border:1px solid var(--faint); border-radius:2px; padding:16px; }
.ch-glyph { font-size:52px; color:var(--brush); flex-shrink:0; filter:drop-shadow(1px 2px 0 rgba(30,21,10,0.1)); }
.ch-info { flex:1; }
.ch-name { font-family:'Ma Shan Zheng',cursive; font-size:20px; color:var(--gold-l); margin-bottom:4px; }
.ch-text { font-size:12px; line-height:1.9; color:var(--fade); }

.meta-box { margin-top:28px; border-top:1px solid var(--faint); padding-top:16px; font-size:10px; letter-spacing:1px; color:var(--faint); line-height:2.2; font-family:monospace; }

.loading-dots::after {
  content: '…';
  animation: ldots 1.2s steps(4,end) infinite;
}
@keyframes ldots {
  0%  { content:''; }
  25% { content:'.'; }
  50% { content:'..'; }
  75% { content:'...'; }
}
.ai-loading { color:var(--fade); font-style:italic; font-size:13px; }
.ai-text { font-size:14px; line-height:2; color:var(--brush); animation:fadeIn 0.6s ease both; }

.restart-btn {
  width:100%; margin-top:24px; background:transparent; border:1px solid var(--faint); border-radius:2px;
  padding:12px; font-family:'Noto Serif TC',serif; font-size:12px; letter-spacing:4px; color:var(--fade); cursor:pointer; transition:all 0.25s;
}
.restart-btn:hover { border-color:var(--gold-l); color:var(--gold); }

.shake { animation:shake 0.35s ease; }

.refined-input {
  width:100%; background:transparent; border:none;
  border-bottom:1px solid var(--faint); color:var(--brush);
  font-family:'Noto Serif TC',serif; font-size:14px;
  padding:10px 2px; outline:none; resize:none; height:96px;
  transition:border-color 0.3s; line-height:1.9;
}
.refined-input:focus { border-bottom-color:var(--gold); }

@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }
@keyframes spin    { to{transform:rotate(360deg)} }
@keyframes pulse   { 0%,100%{opacity:0.5} 50%{opacity:1} }
@keyframes shake   {
  0%{transform:translateX(0)} 20%{transform:translateX(-7px)}
  40%{transform:translateX(6px)} 60%{transform:translateX(-4px)}
  80%{transform:translateX(3px)} 100%{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="site-header">
    <div class="seal">卜</div>
    <div class="site-title">玄 機 易 卜</div>
    <div class="site-sub">天地人三才 · 毫秒起卦</div>
    <div class="mode-toggle" style="margin-top:20px">
      <button class="mode-btn active" id="modeRandom" onclick="setMode('random')">隨 緣 問 卦</button>
      <div class="mode-sep"></div>
      <button class="mode-btn" id="modeRefined" onclick="setMode('refined')">精 緻 問 卦</button>
    </div>
  </div>

  <div class="steps" id="stepsBar">
    <div class="step-node active" id="sn1">人<span class="step-lbl">立標</span></div>
    <div class="step-line" id="sl1"></div>
    <div class="step-node" id="sn2">地<span class="step-lbl">問事</span></div>
    <div class="step-line" id="sl2"></div>
    <div class="step-node" id="sn3">天<span class="step-lbl">起卦</span></div>
  </div>

  <!-- Panel 1：人部 -->
  <div class="panel active" id="panel1">
    <div class="daoist-box">
      <div class="daoist-ava">卜</div>
      <div class="daoist-bubble">
        <div class="speech">老夫在此恭候。<br>先留下你的名號，讓老夫認識你。</div>
      </div>
    </div>
    <div class="sect-lbl">人 · 定數</div>
    <div class="field">
      <label>你的稱呼或網路 ID</label>
      <input type="text" id="userId" placeholder="輸入你常用的名稱" maxlength="30" autocomplete="off">
    </div>
    <div id="rqWrap" style="display:none">
      <div class="daoist-box" style="margin-top:20px">
        <div class="daoist-ava">卜</div>
        <div class="daoist-bubble">
          <div class="speech" id="rqText">…</div>
        </div>
      </div>
      <div class="opt-grid" id="rqOpts"></div>
    </div>

    <!-- 精緻模式：自填心語 -->
    <div id="refinedWrap" style="display:none;margin-top:20px">
      <div class="daoist-box">
        <div class="daoist-ava">卜</div>
        <div class="daoist-bubble">
          <div class="speech">老夫不問閒事。<br>你心中有什麼話，<span class="speech-em">直接說出來</span>便是。<br>字數越真，卦象越準。</div>
        </div>
      </div>
      <div class="field" style="margin-top:16px">
        <label>此刻心中想說的話（隨意書寫）</label>
        <textarea id="refinedInput" class="refined-input" placeholder="可以是你的心情、你的困惑、或者你對這件事的感受……"></textarea>
      </div>
    </div>
    <button class="next-btn" id="p1Btn" onclick="handleP1()">繼續 →</button>
  </div>

  <!-- Panel 2：地部 -->
  <div class="panel" id="panel2">
    <div class="daoist-box">
      <div class="daoist-ava">卜</div>
      <div class="daoist-bubble">
        <div class="speech">嗯。<br>說吧，<span class="speech-em" id="greetName"></span>，<br>今日所求，是何方向？</div>
      </div>
    </div>
    <div class="sect-lbl">地 · 問事</div>
    <div class="domain-grid" id="domainGrid"></div>
    <div class="other-wrap" id="otherWrap">
      <div class="field">
        <label>請描述你想問的事</label>
        <textarea id="otherText" placeholder="簡單說明你的問題…"></textarea>
      </div>
    </div>
    <button class="next-btn" onclick="handleP2()">凝神，繼續 →</button>
  </div>

  <!-- Panel 3：天部 -->
  <div class="panel" id="panel3">
    <div class="daoist-box">
      <div class="daoist-ava">卜</div>
      <div class="daoist-bubble">
        <div class="speech">
          天時由不得人。<br>
          心念已定，便按下此符——<br>
          <span class="speech-em">那一瞬，即是天意。</span>
        </div>
      </div>
    </div>
    <div class="sect-lbl">天 · 起卦</div>
    <div style="text-align:center;margin:16px 0 8px">
      <div style="font-size:12px;color:var(--fade);letter-spacing:2px;line-height:2;margin-bottom:24px">
        閉上眼，想清楚你的問題，<br>然後按下。
      </div>
      <button class="cast-btn" onclick="startCast()">　起　卦　</button>
    </div>
  </div>

  <!-- Casting -->
  <div id="castScreen">
    <div class="cast-ring"></div>
    <div class="cast-glyph">☰☷☲☵</div>
    <div class="cast-words">天地人三才交匯中⋯⋯</div>
  </div>

  <!-- Result -->
  <div id="resultScreen">
    <div class="r-hex">
      <div class="r-glyph"  id="rG"></div>
      <div class="r-name"   id="rN"></div>
      <div class="r-pinyin" id="rP"></div>
    </div>

    <div class="r-sec">
      <div class="r-lbl">本 卦 · 當前格局</div>
      <div class="r-body" id="rJ"></div>
      <div class="r-body" style="margin-top:6px;color:var(--gold)" id="rI"></div>
    </div>

    <!-- 本卦白話詮釋 -->
    <div class="r-sec" id="secHexMeaning">
      <div class="r-lbl">此 卦 之 意</div>
      <div class="r-body ai-loading" id="rHexMeaning"><span class="loading-dots">正在解讀卦象</span></div>
    </div>

    <div class="r-sec">
      <div class="r-lbl">六 爻 · 結構</div>
      <div class="yao-stack" id="rYS"></div>
    </div>

    <div class="r-sec">
      <div class="r-lbl">動 爻 · 轉機</div>
      <div class="r-body"><span style="color:var(--vermil);font-weight:600" id="rYP"></span></div>
      <div class="r-sub" id="rYT"></div>
      <!-- 動爻說明 -->
      <div class="r-body ai-loading" id="rYaoMeaning" style="margin-top:12px"><span class="loading-dots">正在解讀動爻</span></div>
    </div>

    <div class="r-sec">
      <div class="r-lbl">變 卦 · 趨向</div>
      <!-- 變卦介紹 -->
      <div class="r-sub" id="rChangedIntro" style="margin-bottom:14px;border-left-color:var(--gold-l)"></div>
      <div class="ch-box">
        <div class="ch-glyph" id="rCG"></div>
        <div class="ch-info">
          <div class="ch-name" id="rCN"></div>
          <div class="ch-text" id="rCT"></div>
        </div>
      </div>
      <!-- 變卦說明 -->
      <div class="r-body ai-loading" id="rChangedMeaning" style="margin-top:12px"><span class="loading-dots">正在解讀變卦</span></div>
    </div>

    <!-- 總結 -->
    <div class="r-sec" id="secSummary">
      <div class="r-lbl">綜 合 總 結</div>
      <div class="r-body ai-loading" id="rSummary"><span class="loading-dots">正在統整卦意</span></div>
    </div>

    <div class="meta-box" id="rM"></div>
    <button class="restart-btn" onclick="restart()">重新占卜</button>
    <button class="restart-btn" id="exportBtn" onclick="exportResult()" style="margin-top:8px;border-color:var(--gold-l);color:var(--gold)">匯出占卜結果 .txt</button>
  </div>

</div>

<script>
// ── 64 卦資料 ──────────────────────────────────────────────────────────────
const H=[
  {s:'䷀',n:'乾為天',   p:'Qián',      lines:[1,1,1,1,1,1],j:'元亨利貞。',img:'天行健，君子以自強不息。',yao:['潛龍，勿用。','見龍在田，利見大人。','君子終日乾乾，夕惕若，厲，無咎。','或躍在淵，無咎。','飛龍在天，利見大人。','亢龍，有悔。']},
  {s:'䷁',n:'坤為地',   p:'Kūn',       lines:[0,0,0,0,0,0],j:'元亨，利牝馬之貞。',img:'地勢坤，君子以厚德載物。',yao:['履霜，堅冰至。','直方大，不習，無不利。','含章可貞，或從王事，無成有終。','括囊，無咎，無譽。','黃裳，元吉。','龍戰于野，其血玄黃。']},
  {s:'䷂',n:'水雷屯',   p:'Zhūn',      lines:[1,0,0,0,1,0],j:'元亨，利貞。勿用，有攸往，利建侯。',img:'雲雷，屯；君子以經綸。',yao:['磐桓，利居貞，利建侯。','屯如邅如，乘馬班如，匪寇婚媾，女子貞不字，十年乃字。','即鹿無虞，惟入於林中，君子幾不如捨，往吝。','乘馬班如，求婚媾，往吉，無不利。','屯其膏，小貞吉，大貞凶。','乘馬班如，泣血漣如。']},
  {s:'䷃',n:'山水蒙',   p:'Méng',      lines:[0,1,0,0,0,1],j:'亨。匪我求童蒙，童蒙求我。初筮告，再三瀆，瀆則不告。利貞。',img:'山下出泉，蒙；君子以果行育德。',yao:['發蒙，利用刑人，用說桎梏，以往吝。','包蒙，吉。納婦，吉。子克家。','勿用取女，見金夫，不有躬，無攸利。','困蒙，吝。','童蒙，吉。','擊蒙，不利為寇，利禦寇。']},
  {s:'䷄',n:'水天需',   p:'Xū',        lines:[1,1,1,0,1,0],j:'有孚，光亨，貞吉，利涉大川。',img:'雲上於天，需；君子以飲食宴樂。',yao:['需于郊，利用恒，無咎。','需于沙，小有言，終吉。','需于泥，致寇至。','需于血，出自穴。','需于酒食，貞吉。','入于穴，有不速之客三人來，敬之終吉。']},
  {s:'䷅',n:'天水訟',   p:'Sòng',      lines:[0,1,0,1,1,1],j:'有孚，窒惕，中吉，終凶。利見大人，不利涉大川。',img:'天與水違行，訟；君子以作事謀始。',yao:['不永所事，小有言，終吉。','不克訟，歸而逋，其邑人三百戶，無眚。','食舊德，貞厲，終吉；或從王事，無成。','不克訟，復即命，渝，安貞，吉。','訟，元吉。','或錫之鞶帶，終朝三褫之。']},
  {s:'䷆',n:'地水師',   p:'Shī',       lines:[0,1,0,0,0,0],j:'貞，丈人，吉，無咎。',img:'地中有水，師；君子以容民畜眾。',yao:['師出以律，否臧凶。','在師中，吉，無咎，王三錫命。','師或輿尸，凶。','師左次，無咎。','田有禽，利執言，無咎。','大君有命，開國承家，小人勿用。']},
  {s:'䷇',n:'水地比',   p:'Bǐ',        lines:[0,0,0,0,1,0],j:'吉，原筮元永貞，無咎，不寧方來，後夫凶。',img:'地上有水，比；先王以建萬國，親諸侯。',yao:['有孚，比之，無咎。','比之自內，貞吉。','比之匪人。','外比之，貞吉。','顯比，王用三驅，失前禽，邑人不誡，吉。','比之無首，凶。']},
  {s:'䷈',n:'風天小畜', p:'Xiǎo Xù',  lines:[1,1,1,0,1,1],j:'亨，密雲不雨，自我西郊。',img:'風行天上，小畜；君子以懿文德。',yao:['復自道，何其咎，吉。','牽復，吉。','輿說輻，夫妻反目。','有孚，血去惕出，無咎。','有孚攣如，富以其鄰。','既雨既處，尚德載，婦貞厲，月幾望，君子征凶。']},
  {s:'䷉',n:'天澤履',   p:'Lǚ',        lines:[1,1,0,1,1,1],j:'履虎尾，不咥人，亨。',img:'上天下澤，履；君子以辨上下，定民志。',yao:['素履往，無咎。','履道坦坦，幽人貞吉。','眇能視，跛能履，履虎尾，咥人，凶。','履虎尾，愬愬，終吉。','夬履，貞厲。','視履考祥，其旋元吉。']},
  {s:'䷊',n:'地天泰',   p:'Tài',       lines:[1,1,1,0,0,0],j:'小往大來，吉，亨。',img:'天地交，泰；后以財成天地之道，輔相天地之宜，以左右民。',yao:['拔茅茹以其匯，征吉。','包荒，用馮河，不遐遺，朋亡，得尚於中行。','無平不陂，無往不復，艱貞無咎。','翩翩不富，以其鄰，不戒以孚。','帝乙歸妹，以祉元吉。','城復于隍，勿用師，自邑告命，貞吝。']},
  {s:'䷋',n:'天地否',   p:'Pǐ',        lines:[0,0,0,1,1,1],j:'否之匪人，不利君子貞，大往小來。',img:'天地不交，否；君子以儉德辟難，不可榮以祿。',yao:['拔茅茹以其匯，貞吉，亨。','包承，小人吉，大人否，亨。','包羞。','有命，無咎，疇離祉。','休否，大人吉，其亡其亡，繫于苞桑。','傾否，先否後喜。']},
  {s:'䷌',n:'天火同人', p:'Tóng Rén',  lines:[1,0,1,1,1,1],j:'同人于野，亨，利涉大川，利君子貞。',img:'天與火，同人；君子以類族辨物。',yao:['同人于門，無咎。','同人于宗，吝。','伏戎於莽，升其高陵，三歲不興。','乘其墉，弗克攻，吉。','同人先號咷而後笑，大師克相遇。','同人于郊，無悔。']},
  {s:'䷍',n:'火天大有', p:'Dà Yǒu',    lines:[1,1,1,1,0,1],j:'元亨。',img:'火在天上，大有；君子以遏惡揚善，順天休命。',yao:['無交害，匪咎，艱則無咎。','大車以載，有攸往，無咎。','公用亨於天子，小人弗克。','匪其彭，無咎。','厥孚交如，威如，吉。','自天祐之，吉，無不利。']},
  {s:'䷎',n:'地山謙',   p:'Qiān',      lines:[0,0,1,0,0,0],j:'亨，君子有終。',img:'地中有山，謙；君子以裒多益寡，稱物平施。',yao:['謙謙君子，用涉大川，吉。','鳴謙，貞吉。','勞謙，君子有終，吉。','無不利，撝謙。','不富，以其鄰，利用侵伐，無不利。','鳴謙，利用行師，征邑國。']},
  {s:'䷏',n:'雷地豫',   p:'Yù',        lines:[0,0,0,1,0,0],j:'利建侯行師。',img:'雷出地奮，豫；先王以作樂崇德，殷薦之上帝，以配祖考。',yao:['鳴豫，凶。','介于石，不終日，貞吉。','盱豫，悔，遲有悔。','由豫，大有得，勿疑，朋盍簪。','貞疾，恒不死。','冥豫，成有渝，無咎。']},
  {s:'䷐',n:'澤雷隨',   p:'Suí',       lines:[1,0,0,1,1,0],j:'元亨，利貞，無咎。',img:'澤中有雷，隨；君子以嚮晦入宴息。',yao:['官有渝，貞吉，出門交有功。','系小子，失丈夫。','系丈夫，失小子，隨有求得，利居貞。','隨有獲，貞凶，有孚在道，以明，何咎。','孚于嘉，吉。','拘系之，乃從維之，王用亨于西山。']},
  {s:'䷑',n:'山風蠱',   p:'Gǔ',        lines:[0,1,1,0,0,1],j:'元亨，利涉大川，先甲三日，後甲三日。',img:'山下有風，蠱；君子以振民育德。',yao:['幹父之蠱，有子，考無咎，厲，終吉。','幹母之蠱，不可貞。','幹父之蠱，小有悔，無大咎。','裕父之蠱，往見吝。','幹父之蠱，用譽。','不事王侯，高尚其事。']},
  {s:'䷒',n:'地澤臨',   p:'Lín',       lines:[1,1,0,0,0,0],j:'元亨，利貞，至于八月有凶。',img:'澤上有地，臨；君子以教思無窮，容保民無疆。',yao:['咸臨，貞吉。','咸臨，吉，無不利。','甘臨，無攸利，既憂之，無咎。','至臨，無咎。','知臨，大君之宜，吉。','敦臨，吉，無咎。']},
  {s:'䷓',n:'風地觀',   p:'Guān',      lines:[0,0,0,0,1,1],j:'盥而不薦，有孚顒若。',img:'風行地上，觀；先王以省方觀民設教。',yao:['童觀，小人無咎，君子吝。','窺觀，利女貞。','觀我生，進退。','觀國之光，利用賓于王。','觀我生，君子無咎。','觀其生，君子無咎。']},
  {s:'䷔',n:'火雷噬嗑', p:'Shì Kè',   lines:[1,0,0,1,0,1],j:'亨，利用獄。',img:'雷電，噬嗑；先王以明罰敕法。',yao:['屨校滅趾，無咎。','噬膚，滅鼻，無咎。','噬腊肉，遇毒，小吝，無咎。','噬乾胏，得金矢，利艱貞，吉。','噬乾肉，得黃金，貞厲，無咎。','何校滅耳，凶。']},
  {s:'䷕',n:'山火賁',   p:'Bì',        lines:[1,0,1,0,0,1],j:'亨，小利，有攸往。',img:'山下有火，賁；君子以明庶政，無敢折獄。',yao:['賁其趾，舍車而徒。','賁其須。','賁如濡如，永貞吉。','賁如皤如，白馬翰如，匪寇，婚媾。','賁于丘園，束帛戔戔，吝，終吉。','白賁，無咎。']},
  {s:'䷖',n:'山地剝',   p:'Bō',        lines:[0,0,0,0,0,1],j:'不利有攸往。',img:'山附於地，剝；上以厚下，安宅。',yao:['剝床以足，蔑，貞凶。','剝床以辨，蔑，貞凶。','剝之，無咎。','剝床以膚，凶。','貫魚，以宮人寵，無不利。','碩果不食，君子得輿，小人剝廬。']},
  {s:'䷗',n:'地雷復',   p:'Fù',        lines:[1,0,0,0,0,0],j:'亨，出入無疾，朋來無咎，反復其道，七日來復，利有攸往。',img:'雷在地中，復；先王以至日閉關，商旅不行，後不省方。',yao:['不遠復，無祗悔，元吉。','休復，吉。','頻復，厲，無咎。','中行獨復。','敦復，無悔。','迷復，凶，有災眚，用行師，終有大敗。']},
  {s:'䷘',n:'天雷無妄', p:'Wú Wàng',  lines:[1,0,0,1,1,1],j:'元亨，利貞。其匪正有眚，不利有攸往。',img:'天下雷行，物與無妄；先王以茂對時，育萬物。',yao:['無妄，往吉。','不耕穫，不菑畬，則利有攸往。','無妄之災，或繫之牛，行人之得，邑人之災。','可貞，無咎。','無妄之疾，勿藥有喜。','無妄，行有眚，無攸利。']},
  {s:'䷙',n:'山天大畜', p:'Dà Xù',    lines:[1,1,1,0,0,1],j:'利貞，不家食吉，利涉大川。',img:'天在山中，大畜；君子以多識前言往行，以畜其德。',yao:['有厲，利已。','輿說輹。','良馬逐，利艱貞，曰閑輿衛，利有攸往。','童牛之牿，元吉。','豶豕之牙，吉。','何天之衢，亨。']},
  {s:'䷚',n:'山雷頤',   p:'Yí',        lines:[1,0,0,0,0,1],j:'貞吉，觀頤，自求口實。',img:'山下有雷，頤；君子以慎言語，節飲食。',yao:['舍爾靈龜，觀我朵頤，凶。','顛頤，拂經，于丘頤，征凶。','拂頤，貞凶，十年勿用，無攸利。','顛頤，吉，虎視眈眈，其欲逐逐，無咎。','拂經，居貞吉，不可涉大川。','由頤，厲吉，利涉大川。']},
  {s:'䷛',n:'澤風大過', p:'Dà Guò',   lines:[0,1,1,1,1,0],j:'棟橈，利有攸往，亨。',img:'澤滅木，大過；君子以獨立不懼，遯世無悶。',yao:['藉用白茅，無咎。','枯楊生稊，老夫得其女妻，無不利。','棟橈，凶。','棟隆，吉，有它，吝。','枯楊生華，老婦得其士夫，無咎無譽。','過涉滅頂，凶，無咎。']},
  {s:'䷜',n:'坎為水',   p:'Kǎn',       lines:[0,1,0,0,1,0],j:'有孚，維心亨，行有尚。',img:'水洊至，習坎；君子以常德行，習教事。',yao:['習坎，入于坎窞，凶。','坎有險，求小得。','來之坎坎，險且枕，入于坎窞，勿用。','樽酒簋貳，用缶，納約自牖，終無咎。','坎不盈，祗既平，無咎。','係用徽纆，寘于叢棘，三歲不得，凶。']},
  {s:'䷝',n:'離為火',   p:'Lí',        lines:[1,0,1,1,0,1],j:'利貞，亨，畜牝牛，吉。',img:'明兩作，離；大人以繼明照于四方。',yao:['履錯然，敬之無咎。','黃離，元吉。','日昃之離，不鼓缶而歌，則大耄之嗟，凶。','突如其來如，焚如，死如，棄如。','出涕沱若，戚嗟若，吉。','王用出征，有嘉，折首，獲匪其醜，無咎。']},
  {s:'䷞',n:'澤山咸',   p:'Xián',      lines:[0,0,1,1,1,0],j:'亨，利貞，取女吉。',img:'山上有澤，咸；君子以虛受人。',yao:['咸其拇。','咸其腓，凶，居吉。','咸其股，執其隨，往吝。','貞吉，悔亡，憧憧往來，朋從爾思。','咸其脢，無悔。','咸其輔頰舌。']},
  {s:'䷟',n:'雷風恒',   p:'Héng',      lines:[0,1,1,1,0,0],j:'亨，無咎，利貞，利有攸往。',img:'雷風，恒；君子以立不易方。',yao:['浚恒，貞凶，無攸利。','悔亡。','不恒其德，或承之羞，貞吝。','田無禽。','恒其德，貞，婦人吉，夫子凶。','振恒，凶。']},
  {s:'䷠',n:'天山遯',   p:'Dùn',       lines:[0,0,1,1,1,1],j:'亨，小利貞。',img:'天下有山，遯；君子以遠小人，不惡而嚴。',yao:['遯尾，厲，勿用有攸往。','執之用黃牛之革，莫之勝說。','系遯，有疾厲，畜臣妾，吉。','好遯，君子吉，小人否。','嘉遯，貞吉。','肥遯，無不利。']},
  {s:'䷡',n:'雷天大壯', p:'Dà Zhuàng',lines:[1,1,1,1,0,0],j:'利貞。',img:'雷在天上，大壯；君子以非禮弗履。',yao:['壯于趾，征凶，有孚。','貞吉。','小人用壯，君子用罔，貞厲。','貞吉，悔亡，藩決不羸，壯于大輿之輹。','喪羊于易，無悔。','羝羊觸藩，不能退，不能遂，無攸利，艱則吉。']},
  {s:'䷢',n:'火地晉',   p:'Jìn',       lines:[0,0,0,1,0,1],j:'康侯用錫馬蕃庶，晝日三接。',img:'明出地上，晉；君子以自昭明德。',yao:['晉如摧如，貞吉，罔孚，裕無咎。','晉如愁如，貞吉，受茲介福，于其王母。','眾允，悔亡。','晉如鼫鼠，貞厲。','悔亡，失得勿恤，往吉，無不利。','晉其角，維用伐邑，厲吉，無咎，貞吝。']},
  {s:'䷣',n:'地火明夷', p:'Míng Yí',   lines:[1,0,1,0,0,0],j:'利艱貞。',img:'明入地中，明夷；君子以蒞眾，用晦而明。',yao:['明夷于飛，垂其翼，君子于行，三日不食。','明夷，夷于左股，用拯馬壯，吉。','明夷于南狩，得其大首，不可疾，貞。','入于左腹，獲明夷之心，于出門庭。','箕子之明夷，利貞。','不明，晦，初登于天，後入于地。']},
  {s:'䷤',n:'風火家人', p:'Jiā Rén',   lines:[1,0,1,0,1,1],j:'利女貞。',img:'風自火出，家人；君子以言有物，而行有恒。',yao:['閑有家，悔亡。','無攸遂，在中饋，貞吉。','家人嗃嗃，悔厲，吉，婦子嘻嘻，終吝。','富家，大吉。','王假有家，勿恤，吉。','有孚，威如，終吉。']},
  {s:'䷥',n:'火澤睽',   p:'Kuí',       lines:[1,1,0,1,0,1],j:'小事吉。',img:'上火下澤，睽；君子以同而異。',yao:['悔亡，喪馬勿逐，自復，見惡人，無咎。','遇主于巷，無咎。','見輿曳，其牛掣，其人天且劓，無初有終。','睽孤，遇元夫，交孚，厲，無咎。','悔亡，厥宗噬膚，往何咎。','睽孤，見豕負塗，載鬼一車，先張之弧，後說之弧，匪寇婚媾，往遇雨則吉。']},
  {s:'䷦',n:'水山蹇',   p:'Jiǎn',      lines:[0,0,1,0,1,0],j:'利西南，不利東北，利見大人，貞吉。',img:'山上有水，蹇；君子以反身修德。',yao:['往蹇，來譽。','王臣蹇蹇，匪躬之故。','往蹇，來反。','往蹇，來連。','大蹇，朋來。','往蹇，來碩，吉，利見大人。']},
  {s:'䷧',n:'雷水解',   p:'Xiè',       lines:[0,1,0,1,0,0],j:'利西南，無所往，其來復吉，有攸往，夙吉。',img:'雷雨作，解；君子以赦過宥罪。',yao:['無咎。','田獲三狐，得黃矢，貞吉。','負且乘，致寇至，貞吝。','解而拇，朋至斯孚。','君子維有解，吉，有孚于小人。','公用射隼，于高墉之上，獲之，無不利。']},
  {s:'䷨',n:'山澤損',   p:'Sǔn',       lines:[1,1,0,0,0,1],j:'有孚，元吉，無咎，可貞，利有攸往。',img:'山下有澤，損；君子以懲忿窒欲。',yao:['已事遄往，無咎，酌損之。','利貞，征凶，弗損，益之。','三人行，則損一人；一人行，則得其友。','損其疾，使遄有喜，無咎。','或益之，十朋之龜弗克違，元吉。','弗損，益之，無咎，貞吉，利有攸往，得臣無家。']},

function djb2(s){
  let h=5381;
  for(let i=0;i<s.length;i++) h=((h<<5)+h)^s.charCodeAt(i);
  return h>>>0;
}

// ── Panel 1 ──
function handleP1(){
  const uid=document.getElementById('userId').value.trim();
  if(!uid){shake('panel1');return;}
  st.userId=uid;

  if(st.mode==='refined'){
    if(document.getElementById('refinedWrap').style.display==='none'){
      document.getElementById('refinedWrap').style.display='block';
      document.getElementById('p1Btn').textContent='寫完了，繼續 →';
      document.getElementById('refinedInput').focus();
      return;
    }
    const txt=document.getElementById('refinedInput').value.trim();
    if(!txt){shake('refinedWrap');return;}
    st.refinedTxt=txt;
    st.qRt=Date.now()-st.T1;
    st.T2=Date.now();
    setStep(2); showPanel('panel2');
    document.getElementById('greetName').textContent=st.userId;
    return;
  }

  // 隨緣模式
  if(document.getElementById('rqWrap').style.display==='none'){
    const qi=djb2(uid)%Q.length;
    st.qIdx=qi;
    const item=Q[qi];
    document.getElementById('rqText').innerHTML=
      '……老夫想問你一件不相干的事。<br><span class="speech-em">'+item.q+'</span>';
    const g=document.getElementById('rqOpts');
    g.innerHTML='';
    item.o.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='opt-btn'; b.textContent=o;
      b.onclick=()=>{
        g.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('sel'));
        b.classList.add('sel');
        st.qAns=i;
        st.qRt=Date.now()-st.T1;
      };
      g.appendChild(b);
    });
    document.getElementById('rqWrap').style.display='block';
    document.getElementById('p1Btn').textContent='答完了，繼續 →';
    return;
  }
  if(st.qAns<0){shake('rqWrap');return;}
  st.T2=Date.now();
  setStep(2); showPanel('panel2');
  document.getElementById('greetName').textContent=st.userId;
}

// ── Panel 2 ──
function buildDomains(){
  const g=document.getElementById('domainGrid');
  DOMAINS.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='dom-btn';
    b.innerHTML='<span class="dom-icon">'+d.i+'</span>'+d.l;
    b.onclick=()=>{
      g.querySelectorAll('.dom-btn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel'); st.domain=i;
      document.getElementById('otherWrap').className='other-wrap'+(i===7?' show':'');
    };
    g.appendChild(b);
  });
}

function handleP2(){
  if(st.domain<0){shake('domainGrid');return;}
  if(st.domain===7) st.otherTxt=document.getElementById('otherText').value.trim();
  setStep(3); showPanel('panel3');
}

// ── Cast ──
function startCast(){
  const Tc=Date.now();
  showPanel(null);
  document.getElementById('castScreen').style.display='block';
  setTimeout(()=>{
    const r=compute(Tc);
    showResult(r);
  },2200);
}

function compute(Tc){
  const U=djb2(st.userId);
  const Dv=st.domain;
  const dT=st.T2-st.T1;
  const OL=st.otherTxt.length;
  const R=Math.floor(Math.random()*10);
  const Tm=Tc%1000000;

  // 人部：隨緣用題號×答案；精緻用自填文字hash
  let Pv;
  if(st.mode==='refined'){
    const Rv=djb2(st.refinedTxt);
    const Rt=st.qRt;
    Pv=((U*1000003)+(Rv*7919)+Rt)>>>0;
  } else {
    const Qv=(st.qIdx*4+st.qAns+1);
    const Rt=st.qRt;
    Pv=((U*1000003)+(Qv*7919)+Rt)>>>0;
  }

  // 地部 → 下卦
  const Ev=((djb2(st.userId+st.domain))+(Dv*6271)+dT+(OL*31))>>>0;
  // 天部 → 動爻
  const Hv=(Tm+(R*131071))>>>0;

  const ut=Pv%8;
  const lt=Ev%8;
  const mv=(Pv+Ev+Hv)%6;

  const hexLines=[...TRI[lt],...TRI[ut]];
  const base=findHex(hexLines);
  const cLines=[...hexLines];
  cLines[mv]=cLines[mv]?0:1;
  const changed=findHex(cLines);

  return{base,changed,mv,hexLines,S:Pv+'|'+Ev+'|'+Hv,Tc,R};
}

function showResult({base,changed,mv,hexLines,S,Tc,R}){
  document.getElementById('castScreen').style.display='none';
  document.getElementById('rG').textContent=base.s;
  document.getElementById('rN').textContent=base.n;
  document.getElementById('rP').textContent=base.p;
  document.getElementById('rJ').textContent=base.j;
  document.getElementById('rI').textContent=base.img;

  // Yao stack
  const stack=document.getElementById('rYS');
  stack.innerHTML='';
  const pos=['初','二','三','四','五','上'];
  for(let i=0;i<6;i++){
    const row=document.createElement('div');
    row.className='yao-row'+(i===mv?' moving':'');
    const yang=hexLines[i]===1;
    if(yang){
      const s=document.createElement('div');
      s.className='yao-seg yang'; row.appendChild(s);
    } else {
      const s1=document.createElement('div'); s1.className='yao-seg yin';
      const gp=document.createElement('div'); gp.className='yao-gap';
      const s2=document.createElement('div'); s2.className='yao-seg yin';
      row.appendChild(s1); row.appendChild(gp); row.appendChild(s2);
    }
    const lbl=document.createElement('span');
    lbl.className='yao-lbl';
    lbl.textContent=pos[i]+(yang?'陽':'陰')+(i===mv?' ← 動':'');
    row.appendChild(lbl);
    stack.appendChild(row);
  }

  const posName=['初爻','二爻','三爻','四爻','五爻','上爻'];
  document.getElementById('rYP').textContent=posName[mv]+' 為動爻';
  document.getElementById('rYT').textContent=base.yao[mv];
  document.getElementById('rCG').textContent=changed.s;
  document.getElementById('rCN').textContent=changed.n;
  document.getElementById('rCT').textContent=changed.j+'　'+changed.img;

  const d=new Date(Tc);
  document.getElementById('rM').innerHTML=
    '問者：'+st.userId+'　·　'+d.toLocaleString('zh-TW');

  const rs=document.getElementById('resultScreen');
  rs.style.display='block'; rs.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});

  // AI 解卦
  const domainName = DOMAINS[st.domain]?.l || (st.otherTxt||'其他');
  const question = st.mode==='refined' ? st.refinedTxt : (DOMAINS[st.domain]?.l||'');
  fetchAIInterpretation(base, changed, mv, domainName, question, hexLines);
}

// ── AI 解卦 ──
async function fetchAIInterpretation(base, changed, mv, domainName, question, hexLines){
  const posName=['初爻','二爻','三爻','四爻','五爻','上爻'];
  const yaoText = base.yao[mv];
  const yaoPos = posName[mv];
  const yang = hexLines[mv]===1;
  const yaoType = yang?'陽爻':'陰爻';

  const sameHex = base.n === changed.n;

  const prompt = `你是一位精通易經的占卜師，以白話文、簡潔、有溫度地解卦。

本卦：${base.n}（${base.p}）
卦辭：${base.j}
象辭：${base.img}
動爻：${yaoPos}（${yaoType}），爻辭：「${yaoText}」
變卦：${changed.n}（${changed.p}）
問事方向：${domainName}
${question?'問者描述：'+question:''}

請分三段回應，每段之間空一行，格式如下（不要標題、不要編號、不要符號，直接白話）：

第一段：此卦整體含義（2-3句話，白話解釋這一卦在「${domainName}」方面代表什麼處境或趨勢）

第二段：動爻「${yaoText}」的含義（2句話：第一句解釋這爻本身的意象，第二句說明在此問題中的啟示）

第三段：變卦「${changed.n}」的意涵（第一句解釋什麼是變卦，第二句說明由本卦變至此卦對問事方向意味著什麼走向）`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await resp.json();
    const text = data.content?.find(b=>b.type==='text')?.text || '';
    const parts = text.trim().split(/\n\n+/);

    const hexEl = document.getElementById('rHexMeaning');
    hexEl.className='ai-text';
    hexEl.textContent = parts[0]||'';

    const yaoEl = document.getElementById('rYaoMeaning');
    yaoEl.className='ai-text';
    yaoEl.textContent = parts[1]||'';

    // 變卦介紹 + 說明
    const intro = document.getElementById('rChangedIntro');
    intro.textContent = sameHex ? '本卦與變卦相同，表示局勢穩定，動爻之變化在原有格局內自行消化。' : '';

    const changedEl = document.getElementById('rChangedMeaning');
    changedEl.className='ai-text';
    changedEl.textContent = parts[2]||'';

  } catch(e) {
    ['rHexMeaning','rYaoMeaning','rChangedMeaning'].forEach(id=>{
      const el=document.getElementById(id);
      el.className='r-sub';
      el.textContent='（解讀暫時無法取得）';
    });
  }
}

// ── Helpers ──
function showPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  if(id) document.getElementById(id).classList.add('active');
}
function setStep(n){
  for(let i=1;i<=3;i++){
    document.getElementById('sn'+i).className='step-node'+(i<n?' done':i===n?' active':'');
    if(i<3) document.getElementById('sl'+i).className='step-line'+(i<n?' done':'');
  }
}
function shake(id){
  const el=document.getElementById(id);
  el.classList.add('shake');
  setTimeout(()=>el.classList.remove('shake'),400);
}
function restart(){
  st={T1:Date.now(),T2:0,userId:'',qIdx:0,qAns:-1,qRt:0,domain:-1,otherTxt:'',mode:st.mode,refinedTxt:''};
  document.getElementById('userId').value='';
  document.getElementById('rqWrap').style.display='none';
  document.getElementById('refinedWrap').style.display='none';
  if(document.getElementById('refinedInput')) document.getElementById('refinedInput').value='';
  document.getElementById('p1Btn').textContent='繼續 →';
  document.querySelectorAll('.opt-btn,.dom-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('otherText').value='';
  document.getElementById('otherWrap').className='other-wrap';
  const rs=document.getElementById('resultScreen');
  rs.style.display='none'; rs.classList.remove('active');
  // Reset AI interpretation fields
  ['rHexMeaning','rYaoMeaning','rChangedMeaning'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){ el.className='ai-loading'; el.innerHTML='<span class="loading-dots">正在解讀</span>'; }
  });
  const intro=document.getElementById('rChangedIntro');
  if(intro) intro.textContent='';
  document.getElementById('castScreen').style.display='none';
  setStep(1); showPanel('panel1');
  window.scrollTo({top:0,behavior:'smooth'});
}

function exportResult(){
  const hexName   = document.getElementById('rN').textContent || '';
  const hexPinyin = document.getElementById('rP').textContent || '';
  const hexJ      = document.getElementById('rJ').textContent || '';
  const hexImg    = document.getElementById('rI').textContent || '';
  const hexMean   = document.getElementById('rHexMeaning').textContent || '';
  const yaoPos    = document.getElementById('rYP').textContent || '';
  const yaoTxt    = document.getElementById('rYT').textContent || '';
  const yaoMean   = document.getElementById('rYaoMeaning').textContent || '';
  const chgIntro  = document.getElementById('rChangedIntro').textContent || '';
  const chgName   = document.getElementById('rCN').textContent || '';
  const chgTxt    = document.getElementById('rCT').textContent || '';
  const chgMean   = document.getElementById('rChangedMeaning').textContent || '';
  const summary   = document.getElementById('rSummary').textContent || '';
  const meta      = document.getElementById('rM').textContent || '';

  const domainName = DOMAINS[st.domain]?.l || st.otherTxt || '其他';
  const question   = st.mode === 'refined' ? st.refinedTxt : '';

  const lines = [
    '══════════════════════════════',
    '        玄 機 易 卜  占卜結果',
    '══════════════════════════════',
    '',
    '【本卦】' + hexName + '　' + hexPinyin,
    '卦辭：' + hexJ,
    '象辭：' + hexImg,
    '',
    '【此卦之意】',
    hexMean,
    '',
    '【動爻】' + yaoPos,
    '爻辭：' + yaoTxt,
    yaoMean,
    '',
    '【變卦】' + chgName,
    chgTxt,
    chgIntro,
    chgMean,
    '',
    '【綜合總結】',
    summary,
    '',
    '──────────────────────────────',
    '問事方向：' + domainName,
    question ? '問者描述：' + question : '',
    meta,
    '══════════════════════════════',
  ].filter(l => l !== undefined);

  const text = lines.join('\n');
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const d    = new Date();
  const pad  = n => String(n).padStart(2,'0');
  const ts   = d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '_' + pad(d.getHours()) + pad(d.getMinutes());
  a.href     = url;
  a.download = '占卜_' + hexName + '_' + ts + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
